  function getNextCBADeadline() {
    const now = new Date();
    for (const d of CBA_DEADLINES) {
      const due = new Date(d.date + 'T23:59:59');
      if (due >= now) return { deadline: d, daysLeft: Math.ceil((due - now) / (1000*60*60*24)) };
    }
    return { deadline: null, daysLeft: null };
  }

  function cbaUrgencyStyle(daysLeft) {
    if (daysLeft === null) return { bg: '#E3E3DF', fg: '#23262B', weight: 'normal', pulse: false, label: 'No further CBA deadlines on record.' };
    if (daysLeft < 0) return { bg: '#4a0e0e', fg: '#ffffff', weight: 'bold', pulse: true, label: 'PAST DUE by ' + Math.abs(daysLeft) + ' day' + (Math.abs(daysLeft) === 1 ? '' : 's') };
    if (daysLeft > 30) return { bg: '#E3E3DF', fg: '#23262B', weight: 'normal', pulse: false, label: daysLeft + ' days remaining' };
    // 30 -> 0: pale pink to deep red, bolder as it closes in
    const t = Math.min(1, Math.max(0, (30 - daysLeft) / 30));
    const start = [253, 214, 220]; // pale pink at day 30
    const end = [122, 15, 15];     // deep red at day 0
    const rgb = start.map((s, i) => Math.round(s + (end[i] - s) * t));
    const bg = 'rgb(' + rgb.join(',') + ')';
    const fg = t > 0.55 ? '#ffffff' : '#5a1a1a';
    const weight = t > 0.75 ? '900' : (t > 0.4 ? 'bold' : '600');
    const pulse = daysLeft <= 3;
    return { bg, fg, weight, pulse, label: daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' remaining' };
  }

  async function copyWithPrompt(text, citation) {
    let toCopy = text;
    if (citation) {
      const includeCite = confirm('Include the citation reference (' + citation + ') in the copied text?');
      if (includeCite) toCopy = text + ' ' + citation;
    }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(toCopy);
        return true;
      }
    } catch (e) { /* fall through to legacy method */ }
    try {
      const ta = document.createElement('textarea');
      ta.value = toCopy;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e) { return false; }
  }

  function buildCopyButton(text, citation) {
    const btn = el('button', 'copy-btn', 'Copy');
    btn.type = 'button';
    btn.title = 'Copy without the citation marking by default \u2014 you\'ll be asked first if you want it included.';
    btn.onclick = async (e) => {
      e.stopPropagation();
      const ok = await copyWithPrompt(text, citation);
      const original = btn.textContent;
      btn.textContent = ok ? 'Copied' : 'Failed';
      setTimeout(() => { btn.textContent = original; }, 1200);
    };
    return btn;
  }

  function attachDictation(textarea, statusEl, onCommit) {
    const Recognition = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);
    const row = el('div', 'dictate-row');
    const btn = el('button', 'dictate-btn');
    btn.type = 'button';
    btn.innerHTML = '<span class="mic-dot"></span> Dictate';
    row.appendChild(btn);
    if (!Recognition) {
      btn.disabled = true;
      btn.title = 'Speech recognition not supported in this browser. Try Chrome or Edge.';
      row.appendChild(el('span', 'notes-status', 'Voice input needs Chrome or Edge.'));
      return row;
    }
    let recognizing = false;
    let recognition;
    btn.onclick = () => {
      if (recognizing) { recognition.stop(); return; }
      recognition = new Recognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      let finalTranscript = textarea.value ? textarea.value + ' ' : '';
      recognition.onstart = () => { recognizing = true; btn.classList.add('listening'); btn.innerHTML = '<span class="mic-dot"></span> Listening... (click to stop)'; };
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
          else interim += event.results[i][0].transcript;
        }
        textarea.value = finalTranscript + interim;
      };
      recognition.onerror = (e) => { if (statusEl) statusEl.textContent = 'Mic error: ' + e.error; };
      recognition.onend = () => {
        recognizing = false; btn.classList.remove('listening'); btn.innerHTML = '<span class="mic-dot"></span> Dictate';
        if (onCommit) onCommit(textarea.value);
      };
      recognition.start();
    };
    return row;
  }

    if (!link) return null;
    const m = link.match(/\/d\/([a-zA-Z0-9_-]+)/) || link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (!m) return null;
    return 'https://drive.google.com/file/d/' + m[1] + '/preview';
  }
  function buildPreviewButton(link) {
    const embedUrl = driveEmbedUrl(link);
    const btn = el('button', 'copy-btn', embedUrl ? 'Preview' : 'Open only');
    btn.type = 'button';
    btn.onclick = () => {
      if (embedUrl) { previewLink = { url: embedUrl, original: link }; render(); }

    };
    return btn;
  }
  function renderDrivePreviewModal(root) {
    if (!previewLink) return;
    const overlay = el('div', 'modal-overlay');
    const modal = el('div', 'modal-box');
    modal.style.maxWidth = '800px';
    const closeBtn = el('button', 'modal-close', '\u00d7');
    closeBtn.onclick = () => { previewLink = null; render(); };
    modal.appendChild(closeBtn);
    modal.appendChild(el('div', 'panel-title', 'Document Preview'));
    const iframe = document.createElement('iframe');
    iframe.src = previewLink.url;
    iframe.style.width = '100%';
    iframe.style.height = '480px';
    iframe.style.border = '1px solid #ddd';
    iframe.style.borderRadius = '6px';
    iframe.setAttribute('allow', 'autoplay');
    modal.appendChild(iframe);
    const openRow = el('div', 'dictate-row');
    openRow.style.marginTop = '10px';
    const openLink = document.createElement('a');
    openLink.href = previewLink.original;
    openLink.target = '_blank';
    openLink.rel = 'noopener';
    openLink.className = 'drive-link';
    openLink.textContent = 'Open full view in Google Drive \u2192';
    openRow.appendChild(openLink);
    modal.appendChild(openRow);
    overlay.appendChild(modal);
    overlay.onclick = (e) => { if (e.target === overlay) { previewLink = null; render(); } };
    root.appendChild(overlay);
  }

  function computeSessionId(submittedBy) {
    const mine = voiceLog.filter(n => n.submittedBy === submittedBy);
    if (mine.length === 0) return genId();
    const last = mine[0]; // voiceLog is unshifted, most recent first
    const gapMs = Date.now() - (last.tsRaw || 0);
    if (gapMs < 30 * 60 * 1000) return last.sessionId;
    return genId();
  }

  function buildTagGroup(title, options, selectedSet, single) {
    const group = el('div', 'tag-group');
    group.appendChild(el('div', 'tag-group-title', title));
    const chipRow = el('div', 'chip-row');
    options.forEach(opt => {
      const chip = el('span', 'chip' + (selectedSet.has(opt) ? ' selected' : ''), opt);
      if (opt === '???') chip.title = "Not sure how to categorize this yet? That's fine \u2014 mark it and keep moving. This is for YOUR uncertainty, not a suggestion from the tool. Find it later with the \"??? Only\" filter on the Notes tab.";
      chip.onclick = () => {
        if (single) {
          selectedSet.clear();
          chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          selectedSet.add(opt);
          chip.classList.add('selected');
        } else {
          if (selectedSet.has(opt)) selectedSet.delete(opt); else selectedSet.add(opt);
          chip.classList.toggle('selected');
        }
      };
      chipRow.appendChild(chip);
    });
    group.appendChild(chipRow);
    return group;
  }

  // ================= EXPORT / IMPORT =================
  function downloadTextFile(filename, content) {
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  async function exportAllNotes() {
    const datestamp = new Date().toISOString().slice(0,10);
    downloadTextFile('evich_notes_ALL_' + datestamp + '.json', JSON.stringify(voiceLog, null, 2));
    lastExportTime = new Date().toLocaleString();
    await storageSet('last_export_time', lastExportTime);
  }
  function exportSmartFilename(entry) {
    const matterShort = (entry.matter || 'General').split(' ')[0].replace(/[^a-zA-Z0-9]/g, '');
    return (entry.submittedBy || 'User') + '_' + matterShort + '_' + (entry.bucket || 'Pending') + '_' + new Date().toISOString().slice(0,10);
  }
  async function exportAndClear() {
    if (voiceLog.length === 0) { alert('No notes to export.'); return; }
    await exportAllNotes();
    const typed = prompt('This device has ' + voiceLog.length + ' note(s). They have just been exported \u2014 make sure that file is saved somewhere safe before continuing.\n\nType CLEAR (all caps) to permanently erase notes from THIS DEVICE ONLY. The exported file will be the only copy until re-imported.');
    if (typed === 'CLEAR') {
      voiceLog = [];
      await saveVoiceLog();
      render();
    }
  }
  function buildImportControl(onDone) {
    const wrap = el('div', 'dictate-row');
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.style.fontFamily = 'Arial, sans-serif';
    input.style.fontSize = '11px';
    input.onchange = async () => {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          const existingIds = new Set(voiceLog.map(n => n.id));
          let added = 0;
          imported.forEach(n => { if (!existingIds.has(n.id)) { voiceLog.push(n); added++; } });
          voiceLog.sort((a, b) => (b.tsRaw || 0) - (a.tsRaw || 0));
          await saveVoiceLog();
          if (onDone) onDone(added);
        } catch (err) { if (onDone) onDone(-1); }
      };
      reader.readAsText(input.files[0]);
    };
    wrap.appendChild(el('span', null, 'Import notes file: '));
    wrap.appendChild(input);
    return wrap;
  }

  // ================= RENDER: NOTES TAB =================
  function noteMatchesFilter(entry) {
    if (noteFilter.people && !(entry.people || []).includes(noteFilter.people)) return false;
    if (noteFilter.docType && !(entry.docTypes || []).includes(noteFilter.docType)) return false;
    if (noteFilter.phase && !(entry.phases || []).includes(noteFilter.phase)) return false;
    if (noteFilter.scope && entry.scope !== noteFilter.scope) return false;
    if (noteFilter.intent && entry.intent !== noteFilter.intent) return false;
    if (noteFilter.submittedBy && entry.submittedBy !== noteFilter.submittedBy) return false;
    if (noteFilter.bucket && entry.bucket !== noteFilter.bucket) return false;
    if (noteFilter.matter && entry.matter !== noteFilter.matter) return false;
    if (noteFilter.onlyUnknown) {
      const hasUnknown = [entry.scope, entry.intent, ...(entry.people||[]), ...(entry.docTypes||[]), ...(entry.phases||[])].includes('???');
      if (!hasUnknown) return false;
    }
    return true;
  }

      ['star', 'PURSUING JUSTICE', 'With clarity and purpose.']
    ];
    const footerIcons = {
      shield: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#B08D57"><path d="M12 2 L20 5 V11 C20 16 16.5 20.5 12 22 C7.5 20.5 4 16 4 11 V5 Z"/></svg>',
      pillar: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#B08D57"><path d="M12 2 L21 7 H3 Z"/><rect x="4" y="9" width="2" height="9"/><rect x="8" y="9" width="2" height="9"/><rect x="11" y="9" width="2" height="9"/><rect x="14" y="9" width="2" height="9"/><rect x="18" y="9" width="2" height="9"/><rect x="2" y="19" width="20" height="2"/></svg>',
      star: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#B08D57"><path d="M12 2 L14.7 9 H22 L16 13.5 L18.2 21 L12 16.7 L5.8 21 L8 13.5 L2 9 H9.3 Z"/></svg>'
    };
    footerItems.forEach(([iconKey, title, sub]) => {
      const item = el('div', 'cover-footer-item');
      item.innerHTML = `<div class="cover-footer-icon">${footerIcons[iconKey]}</div><div><div class="cover-footer-title">${title}</div><div class="cover-footer-sub">${sub}</div></div>`;
      footer.appendChild(item);
    });
    root.appendChild(footer);
  }

  // ================= CASE FLOW / BENEFIT ANALYSIS =================
  const CASE_FLOW_PHASES = [
    { phase: "Pre-Trial", range: "10/27/2024 \u2013 10/24/2025", desc: "Petition filed; contested; Rule 16.2 discovery stayed pending marriage determination; Motion to Compel denied (4/30/2025); counsel substitution (Antolinez \u2192 White, 6/27/2025); JTMC (stipulated facts) filed 10/24/2025." },
    { phase: "Trial", range: "10/28/2025", desc: "Full-day evidentiary hearing before Judge Jones." },
    { phase: "Final Ruling", range: "12/4/2025", desc: "No marriage found; petition dismissed with prejudice. Findings 51 and 52, as originally entered, directly contradicted Finding 38 and Finding 83 in the same order." },
    { phase: "Post-Trial (Rule 59)", range: "12/18/2025 \u2013 4/23/2026", desc: "White withdraws same day Rule 59 deadline expires; Petitioner proceeds pro se; Notice of Asset Designation Changes filed; Judge Jones grants in part, corrects Findings 51 & 52; Judge Washburn's signed order conflicts with that outcome." },
    { phase: "Appeal", range: "6/9/2026 \u2013 present", desc: "Notice of Appeal filed; Record designated (6/15/2026); Record on Appeal due from the District Court Clerk 8/11/2026; Opening Brief to follow 42 days after." }
  ];

  const BENEFIT_ANALYSIS = {
    benefits: [
      "Two factual errors (Findings 51 and 52) are now admitted by the trial court itself \u2014 not alleged, conceded \u2014 and were never reweighed under the mandatory Hogsett totality standard.",
      "The application of Hogsett to corrected facts is a legal question reviewed de novo \u2014 the trial court's usual discretion does not extend to whether the mandatory totality analysis was actually performed.",
      "A successful appeal supports identifying and valuing the marital estate as of the October 27, 2024 filing date, addressing the undisclosed beneficiary deed changes made during litigation (2/27/2025 and 2/4/2026).",
      "The Notice of Appeal, docket fee, and Designation of Record were all timely filed \u2014 the jurisdictional steps are already secured.",
      "Nearly three decades (1996\u20132024) of a relationship that predates marriage equality is at stake; LaFleur v. Pyfer directs that conduct, not paperwork, is the primary evidence of intent for exactly this kind of couple."
    ],
    costs: [
      "Colorado gives trial courts wide discretion on factual findings (clear-error review) \u2014 a panel could characterize the corrections as harmless rather than material.",
      "Preservation risk: whether the Finding 52/83 internal contradiction (not just the JTMC/Exhibit 48 contradiction) was specifically raised in the Rule 59 briefing below.",
      "Financial cost: appeal costs and briefing time run alongside the still-unresolved CBA fee arbitration (hearing 10/9/2026).",
      "Time cost: Record on Appeal not due until 8/11/2026; Opening Brief, Answer Brief, optional Reply, and any oral argument could extend well into 2027 before a decision.",
      "Emotional cost of continuing to relitigate a 28-year relationship in an adversarial forum, with no guarantee that a reweighed totality analysis resolves in Petitioner's favor even on remand."
    ],
    bottomLine: "Issue I currently carries a Strength rating of A. The benefits rest on a legal error the trial court has already admitted and on a standard of review (de novo) that does not defer to the trial court's discretion \u2014 that is a stronger foundation than most appeals start from. The principal risks are not about the facts, which are now largely undisputed, but about how the error is framed: preservation of the Finding 52/83 argument specifically, and pre-answering the harmless-error argument before the panel raises it. Both are addressable in the Opening Brief, not open questions about whether to proceed."
  };

  function renderCaseFlow(panel) {
    panel.appendChild(el('div', 'section-heading', 'Case Flow \u2014 Phase by Phase'));
    panel.appendChild(el('div', 'compat-note', 'Each phase links back to the full Rulings & Procedural Timeline in Case Foundation \u2192 Timeline.'));
    CASE_FLOW_PHASES.forEach((p, i) => {
      const box = el('div', 'voice-entry');
      box.style.borderLeft = '4px solid #1F3864';
      const head = el('div', null, `<strong>${i + 1}. ${p.phase}</strong> <span class="cite">${p.range}</span>`);
      box.appendChild(head);
      box.appendChild(el('div', null, p.desc));
      panel.appendChild(box);
    });
  }

  function renderBenefitAnalysis(panel) {
    panel.appendChild(el('div', 'section-heading', 'Benefits of Pursuing the Appeal'));
    panel.appendChild(renderTextList(BENEFIT_ANALYSIS.benefits));
    panel.appendChild(el('div', 'section-heading', 'Costs & Risks'));
    panel.appendChild(renderTextList(BENEFIT_ANALYSIS.costs));
    panel.appendChild(el('div', 'section-heading', 'Bottom Line'));
    const bl = el('div', 'relief-banner');
    bl.style.background = 'var(--navy)';
    bl.appendChild(el('div', null, BENEFIT_ANALYSIS.bottomLine));
    panel.appendChild(bl);
  }

  let flowBenefitSubTab = 'flow';
  function renderFlowBenefit(panel) {
    panel.appendChild(el('div', null, '<strong style="font-size:16px;">Case Flow / Benefit Analysis</strong><div style="font-style:italic;margin-top:4px;">Where the case has been, and the case for continuing forward with the Appeal.</div>'));
    const subtabs = el('div', 'subtabs');
    const defs = [['flow', 'Case Flow'], ['benefit', 'Benefit Analysis']];
    defs.forEach(([key, label]) => {
      const t = el('div', 'subtab' + (flowBenefitSubTab === key ? ' active' : ''), label);
      t.onclick = () => { flowBenefitSubTab = key; render(); };
      subtabs.appendChild(t);
    });
    panel.appendChild(subtabs);
    const inner = el('div');
    inner.style.paddingTop = '14px';
    if (flowBenefitSubTab === 'benefit') renderBenefitAnalysis(inner);
    else renderCaseFlow(inner);
    panel.appendChild(inner);
  }

  function laneTabDefs() {
    if (currentLane === 'cba') return [ ['cba','CBA Fee Arbitration'] ];
    if (currentLane === 'oarc') return [ ['oarc','OARC Complaint'] ];
    if (currentLane === 'whole') return [ ['issue1','Issue I'], ['flowbenefit','Case Flow / Benefit'], ['appealreq','Appeal Requirements'], ['cba','CBA'], ['oarc','OARC'] ];
    return [ ['issue1','Issue I'], ['flowbenefit','Case Flow / Benefit'], ['appealreq','Appeal Requirements'] ]; // appeal (default)
  }

  // ================= MAIN RENDER =================
  async function render() {
    const root = document.getElementById('root');
    root.innerHTML = '';

    if (!currentLane) {
      renderLaneSelector(root);
      return;
    }

    const header = el('div', 'header');
    header.appendChild(el('div', 'version', 'CASE TRACKER \u2014 v22 \u2014 July 22, 2026 \u2014 Full Edit added to Label Tracker, Ledger, and Stephanie\u2019s World'));
    const titleRow = el('div', 'title-row');
    const scalesSvg = `<svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="32" y1="6" x2="32" y2="52" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="54" y2="16" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="20" y2="58" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="44" y2="58" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="4" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="16" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M4 30 Q10 40 16 30" stroke="#B08D57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <line x1="54" y1="16" x2="48" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="54" y1="16" x2="60" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M48 30 Q54 40 60 30" stroke="#B08D57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="32" cy="10" r="4" fill="#B08D57"/>
    </svg>`;
    titleRow.appendChild(el('div', 'scales-icon', scalesSvg));
    const titleText = el('div');
    titleText.appendChild(el('h1', null, 'Evich v. Stone \u2014 Case Command Center'));
    titleText.appendChild(el('div', 'sub', 'Case No. 2024DR31793 (District Court) / 2026CA1119 (Court of Appeals)'));
    titleRow.appendChild(titleText);
    header.appendChild(titleRow);
    const homeBtn = el('div', 'change-lane', '\u2302 Home');
    homeBtn.onclick = () => { currentLane = null; render(); };
    header.appendChild(homeBtn);
    const wideBtn = el('button', 'landscape-toggle-btn' + (wideView ? ' active' : ''), wideView ? '\u2610 Wide View: On' : '\u2610 Wide View: Off');
    wideBtn.type = 'button';
    wideBtn.title = 'Widen the layout for reading dense tables \u2014 independent of device rotation.';
    wideBtn.onclick = async () => { wideView = !wideView; await storageSet('wide_view', wideView ? '1' : '0'); render(); };
    header.appendChild(wideBtn);
    const shareBtn = el('button', 'landscape-toggle-btn', '\u21ea Share');
    shareBtn.type = 'button';
    shareBtn.title = 'Share a link to this tracker.';
    shareBtn.onclick = async () => {
      const shareData = { title: 'Evich v. Stone \u2014 Case Command Center', text: 'Case tracker for Evich v. Stone.', url: window.location.href };
      if (navigator.share) {
        try { await navigator.share(shareData); return; } catch (e) { /* user cancelled or unsupported, fall through */ }
      }
      try {
        await navigator.clipboard.writeText(window.location.href);
        shareBtn.textContent = '\u2713 Link Copied';
      } catch (e) {
        shareBtn.textContent = 'Copy failed \u2014 copy URL manually';
      }
      setTimeout(() => { shareBtn.textContent = '\u21ea Share'; }, 1800);
    };
    header.appendChild(shareBtn);
    root.classList.toggle('wide-view', wideView);
    const vh = el('div', 'version-history', 'Full version history now lives under Case Foundation \u2192 Version History.');
    header.appendChild(vh);
    root.appendChild(header);

    const maintabs = el('div', 'maintabs');
    const tabDefs = [ ['foundation','Case Foundation'], ...laneTabDefs(), ['labels','Label Tracker'], ['voice','Notes'], ['stephanie',"Stephanie's World"] ];
    tabDefs.forEach(([key, label]) => {
      const t = el('div', 'maintab' + (mainTab === key ? ' active' : ''), label);
      t.onclick = () => { mainTab = key; render(); };
      maintabs.appendChild(t);
    });
    root.appendChild(maintabs);

    const panel = el('div', 'body-panel');
    if (mainTab === 'foundation') renderFoundation(panel);
    else if (mainTab === 'issue1') await renderIssue(panel);
    else if (mainTab === 'appealreq') renderAppealRequirements(panel);
    else if (mainTab === 'cba') await renderCBA(panel);
    else if (mainTab === 'flowbenefit') renderFlowBenefit(panel);
    else if (mainTab === 'oarc') renderOARC(panel);
    else if (mainTab === 'stephanie') renderStephanieWorld(panel);
    else if (mainTab === 'labels') renderLabelTracker(panel);
    else renderNotesTab(panel);
    root.appendChild(panel);

    renderMasterMic(root);
    renderDrivePreviewModal(root);
  }

  (async function init() {
    await loadVoiceLog();
    await loadLedger();
    await loadStephanieLinks();
    await loadLabelEntries();
    await loadDocLinkProgress();
    lastExportTime = await storageGet('last_export_time');
    const wv = await storageGet('wide_view');
    wideView = wv === '1';
    render();
  })();
</script>
</body>
</html>
