  function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; }

  function speechSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  function attachDictation(textarea, statusEl, onCommit) {
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const row = el('div', 'dictate-row');
    const btn = el('button', 'dictate-btn');
    btn.innerHTML = '<span class="mic-dot"></span> Dictate';
    row.appendChild(btn);
    if (!Recognition) {
      btn.disabled = true;
      btn.title = 'Speech recognition not supported in this browser. Try Chrome or Edge.';
      row.appendChild(el('span', 'notes-status', 'Voice input needs Chrome or Edge.'));
      return row;
    }
    let recognizing = false;
    let recognition;
    btn.onclick = () => {
      if (recognizing) { recognition.stop(); return; }
      recognition = new Recognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      let finalTranscript = textarea.value ? textarea.value + ' ' : '';
      recognition.onstart = () => { recognizing = true; btn.classList.add('listening'); btn.innerHTML = '<span class="mic-dot"></span> Listening... (click to stop)'; };
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
          else interim += event.results[i][0].transcript;
        }
        textarea.value = finalTranscript + interim;
      };
      recognition.onerror = (e) => { if (statusEl) statusEl.textContent = 'Mic error: ' + e.error; };
      recognition.onend = () => {
        recognizing = false; btn.classList.remove('listening'); btn.innerHTML = '<span class="mic-dot"></span> Dictate';
        if (onCommit) onCommit(textarea.value);
      };
      recognition.start();
    };
    return row;
  }

  }
  async function storageSet(key, value) {
    try { localStorage.setItem('evich_tracker_' + key, value); return true; } catch (e) { return false; }
  }

  // ================= APP STATE =================
  let mainTab = 'foundation';
  let issueLens = 'attorney';
  let voiceLog = [];

  async function loadVoiceLog() {
    const raw = await storageGet('voice_log');
    voiceLog = raw ? JSON.parse(raw) : [];
  }
  async function saveVoiceLog() {
    await storageSet('voice_log', JSON.stringify(voiceLog));
  }

  // ================= RENDER: FOUNDATION =================
  function renderFoundation(panel) {
    panel.appendChild(el('div', 'section-heading', 'Case Identifiers'));
    const idTable = el('table', 'ref');
    idTable.innerHTML = `
      <tr><td style="font-weight:bold;width:220px;">District Court Case No.</td><td>${CASE_INFO.caseNo}</td></tr>
      <tr><td style="font-weight:bold;">Court</td><td>${CASE_INFO.court}</td></tr>
      <tr><td style="font-weight:bold;">Court of Appeals Case No.</td><td>${CASE_INFO.apCaseNo}</td></tr>
      <tr><td style="font-weight:bold;">Case Type</td><td>${CASE_INFO.caseType}</td></tr>
      <tr><td style="font-weight:bold;">Hearing Judge</td><td>${CASE_INFO.hearingJudge}</td></tr>
      <tr><td style="font-weight:bold;">Case Management Judge</td><td>${CASE_INFO.caseMgmtJudge}</td></tr>
      <tr><td style="font-weight:bold;">Petitioner</td><td>${CASE_INFO.petitioner}</td></tr>
      <tr><td style="font-weight:bold;">Respondent</td><td>${CASE_INFO.respondent}</td></tr>
      <tr><td style="font-weight:bold;">Petitioner's Counsel History</td><td>${CASE_INFO.petCounselHistory}</td></tr>
      <tr><td style="font-weight:bold;">Respondent's Counsel</td><td>${CASE_INFO.respCounsel}</td></tr>
    `;
    panel.appendChild(idTable);

    panel.appendChild(el('div', 'section-heading', 'JTMC Stipulated Facts'));
    const jtmcList = el('ul', 'plain');
    JTMC_FACTS.forEach(f => jtmcList.appendChild(el('li', null, f.text + ` <span class="cite">${f.cite}</span>`)));
    panel.appendChild(jtmcList);

    panel.appendChild(el('div', 'section-heading', 'Rulings & Procedural Timeline'));
    const tlTable = el('table', 'ref');
    tlTable.innerHTML = '<tr><th style="width:110px;">Date</th><th>Event</th></tr>' +
      TIMELINE.map(t => `<tr${t.flag ? ' class="flag"' : ''}><td>${t.date}</td><td>${t.event}</td></tr>`).join('');
    panel.appendChild(tlTable);

    panel.appendChild(el('div', 'section-heading', 'Findings Cross-Reference (Breadcrumb Table)'));
    FINDINGS_XREF.forEach(group => {
      panel.appendChild(el('div', null, `<strong>${group.topic}</strong>`)).style.margin = '10px 0 6px 0';
      const t = el('table', 'ref');
      t.innerHTML = '<tr><th style="width:220px;">Source</th><th>Text</th><th style="width:140px;">Citation</th></tr>' +
        group.rows.map(r => `<tr${r.flagRow ? ' class="flag"' : ''}><td>${r.source}${r.discovery ? '<span class="discovery-badge">KEY FIND</span>' : ''}</td><td>${r.text}</td><td class="cite">${r.cite}</td></tr>`).join('');
      panel.appendChild(t);
    });
  }

  // ================= RENDER: ISSUE I =================
  function renderFactsList(items) {
    const ul = el('ul', 'plain');
    items.forEach(f => ul.appendChild(el('li', null, f.text + ` <span class="cite">${f.cite}</span>`)));
    return ul;
  }

  async function renderIssue(panel) {
    const sor = el('div', 'compat-note', '<strong>Standard of Review:</strong> ' + ISSUE.standardOfReview);
    panel.appendChild(sor);
    panel.appendChild(el('div', null, `<strong style="font-size:16px;">${ISSUE.title}</strong><div style="font-style:italic;margin-top:4px;">${ISSUE.statement}</div>`));

    const tabs = el('div', 'tabs');
    Object.keys(LENSES).forEach(key => {
      const tab = el('div', 'tab' + (key === issueLens ? ' active ' + key : ''), LENSES[key].label);
      tab.onclick = () => { issueLens = key; render(); };
      tabs.appendChild(tab);
    });
    panel.appendChild(tabs);

    const lensPanel = el('div', 'panel');
    const lens = LENSES[issueLens];
    lensPanel.appendChild(el('div', 'panel-label ' + issueLens, lens.label));
    lensPanel.appendChild(el('div', 'panel-title', lens.panelTitle));
    lensPanel.appendChild(el('div', 'anchor ' + issueLens, '&ldquo;' + lens.anchor + '&rdquo;'));
    const bodyWrap = el('div');
    lens.body.forEach(p => bodyWrap.appendChild(el('p', null, p)));
    lensPanel.appendChild(bodyWrap);

    lensPanel.appendChild(el('div', 'section-heading', 'Key Facts (Record-Sourced)'));
    lensPanel.appendChild(renderFactsList(FACTS));
    lensPanel.appendChild(el('div', 'section-heading', 'Governing Authorities'));
    lensPanel.appendChild(renderFactsList(AUTHORITIES));

    const badgeRow = el('div', 'badge-row');
    badgeRow.appendChild(el('span', 'strength-badge', 'Strength: ' + STRENGTH.rank));
    badgeRow.appendChild(el('span', 'strength-note', STRENGTH.note));
    lensPanel.appendChild(badgeRow);

    lensPanel.appendChild(el('div', 'section-heading', 'Your Notes \u2014 ' + lens.label + ' (type or dictate)'));
    const textarea = document.createElement('textarea');
    textarea.className = 'notesarea';
    textarea.placeholder = 'Add your own notes for this lens...';
    const status = el('div', 'notes-status', '');
    const dictateRow = attachDictation(textarea, status, () => { scheduleNoteSave(issueLens, textarea, status); });
    lensPanel.appendChild(dictateRow);
    lensPanel.appendChild(textarea);
    lensPanel.appendChild(status);
    let saveTimer;
    textarea.addEventListener('input', () => { clearTimeout(saveTimer); saveTimer = setTimeout(() => saveNote(issueLens, textarea.value, status), 600); });
    textarea.value = (await storageGet('issue1_notes_' + issueLens)) || '';

    panel.appendChild(lensPanel);
    panel.appendChild(el('div', 'footnote', 'Template built from Issue I. Additional issues can be added using this same structure.'));
  }

  function scheduleNoteSave(lens, textarea, status) { saveNote(lens, textarea.value, status); }
  async function saveNote(lens, text, statusEl) {
    const ok = await storageSet('issue1_notes_' + lens, text);
    statusEl.textContent = ok ? 'Saved' : 'Could not save';
    setTimeout(() => { statusEl.textContent = ''; }, 1500);
  }

  // ================= RENDER: VOICE LOG =================
  function renderVoiceLog(panel) {
    panel.appendChild(el('div', 'compat-note',
      'Speech-to-text works in Chrome or Edge (desktop or Android). Short bursts drop straight in; for long dictation, keep talking \u2014 it keeps transcribing until you stop it. ' +
      'Tag each entry once you\'re done, then triage it later into Case Foundation or an Issue tab.'));

    const newEntryBox = el('div', 'voice-entry');
    const textarea = document.createElement('textarea');
    textarea.className = 'notesarea';
    textarea.placeholder = 'Tap Dictate and start talking, or type directly...';
    const status = el('div', 'notes-status', '');
    const dictateRow = attachDictation(textarea, status);
    newEntryBox.appendChild(el('div', null, '<strong>New Entry</strong>'));
    newEntryBox.appendChild(dictateRow);
    newEntryBox.appendChild(textarea);

    const tagRow = el('div', 'dictate-row');
    const tagSelect = document.createElement('select');
    tagSelect.innerHTML = ['Untriaged','Case Foundation','Issue I - Attorney','Issue I - Judge','Issue I - Opposing Counsel','Findings Cross-Reference','General Note']
      .map(t => `<option value="${t}">${t}</option>`).join('');
    tagRow.appendChild(el('span', null, 'Tag: '));
    tagRow.appendChild(tagSelect);
    const saveBtn = el('button', 'dictate-btn', 'Save Entry');
    saveBtn.onclick = async () => {
      if (!textarea.value.trim()) return;
      voiceLog.unshift({ id: Date.now(), text: textarea.value.trim(), tag: tagSelect.value, ts: new Date().toLocaleString() });
      await saveVoiceLog();
      textarea.value = '';
      render();
    };
    tagRow.appendChild(saveBtn);
    newEntryBox.appendChild(tagRow);
    newEntryBox.appendChild(status);
    panel.appendChild(newEntryBox);

    panel.appendChild(el('div', 'section-heading', `Log (${voiceLog.length} entries)`));
    if (voiceLog.length === 0) {
      panel.appendChild(el('div', 'notes-status', 'No entries yet.'));
    }
    voiceLog.forEach(entry => {
      const box = el('div', 'voice-entry');
      const meta = el('div', 'meta');
      meta.appendChild(el('span', null, entry.ts + ' \u2014 ' + entry.tag));
      const delBtn = el('button', 'delete-btn', 'Delete');
      delBtn.onclick = async () => { voiceLog = voiceLog.filter(e => e.id !== entry.id); await saveVoiceLog(); render(); };
      meta.appendChild(delBtn);
      box.appendChild(meta);
      box.appendChild(el('div', null, entry.text));
      panel.appendChild(box);
    });
  }

  // ================= MAIN RENDER =================
  async function render() {
    const root = document.getElementById('root');
    root.innerHTML = '';

    const header = el('div', 'header');
    header.appendChild(el('div', 'version', 'CASE TRACKER \u2014 v3 \u2014 July 22, 2026 \u2014 Foundation + Issue I + Voice Capture (deed timeline \u0026 filing-mechanics update)'));
    const titleRow = el('div', 'title-row');
    const scalesSvg = `<svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="32" y1="6" x2="32" y2="52" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="54" y2="16" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="20" y2="58" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="44" y2="58" stroke="#B08D57" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="4" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="16" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M4 30 Q10 40 16 30" stroke="#B08D57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <line x1="54" y1="16" x2="48" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="54" y1="16" x2="60" y2="30" stroke="#B08D57" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M48 30 Q54 40 60 30" stroke="#B08D57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="32" cy="10" r="4" fill="#B08D57"/>
    </svg>`;
    titleRow.appendChild(el('div', 'scales-icon', scalesSvg));
    const titleText = el('div');
    titleText.appendChild(el('h1', null, 'Evich v. Stone \u2014 Case Command Center'));
    titleText.appendChild(el('div', 'sub', 'Case No. 2024DR31793 (District Court) / 2026CA1119 (Court of Appeals)'));
    titleRow.appendChild(titleText);
    header.appendChild(titleRow);
    root.appendChild(header);

    const maintabs = el('div', 'maintabs');
    const tabDefs = [ ['foundation','Case Foundation'], ['issue1','Issue I'], ['voice','Voice Capture Log'] ];
    tabDefs.forEach(([key, label]) => {
      const t = el('div', 'maintab' + (mainTab === key ? ' active' : ''), label);
      t.onclick = () => { mainTab = key; render(); };
      maintabs.appendChild(t);
    });
    root.appendChild(maintabs);

    const panel = el('div', 'body-panel');
    if (mainTab === 'foundation') renderFoundation(panel);
    else if (mainTab === 'issue1') await renderIssue(panel);
    else renderVoiceLog(panel);
    root.appendChild(panel);
  }

  (async function init() {
    await loadVoiceLog();
    render();
  })();
</script>
</body>
</html>
